<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注册 - 校园流浪动物图鉴</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">🐾 注册学生账号</h1>
    <p class="auth-subtitle">注册后将自动登录并跳转到打卡首页</p>

    <form id="register-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">账号 <span class="required">*</span></label>
        <input type="text" id="username" name="username" required maxlength="50" autofocus />
        <div class="form-hint">建议使用学号或英文名,不超过 50 字符</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密码 <span class="required">*</span></label>
        <input type="password" id="password" name="password" required maxlength="100" />
      </div>
      <div class="form-group">
        <label class="form-label" for="nickname">昵称 <span class="required">*</span></label>
        <input type="text" id="nickname" name="nickname" required maxlength="50" />
        <div class="form-hint">将在打卡时间轴上显示</div>
      </div>
      <div class="error-text" id="err-msg"></div>
      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">注册</button>
    </form>

    <p class="auth-footer">
      已有账号？<a href="/login.html">返回登录</a>
    </p>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/util.js"></script>
  <script>
    (function () {
      const u = getCurrentUser();
      if (u && getToken()) {
        redirectByRole(u);
        return;
      }

      const form = $('register-form');
      const btn = $('btn-submit');
      const err = $('err-msg');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearError(err);
        const username = $('username').value.trim();
        const password = $('password').value;
        const nickname = $('nickname').value.trim();
        if (!username || !password || !nickname) {
          showError(err, '请填写完整的账号、密码与昵称');
          return;
        }
        btn.disabled = true;
        btn.textContent = '注册中...';
        try {
          const data = await register(username, password, nickname);
          redirectByRole({ role: data.role });
        } catch (e2) {
          showError(err, e2.message || '注册失败');
          btn.disabled = false;
          btn.textContent = '注册';
        }
      });
    })();
  </script>
</body>
</html>
