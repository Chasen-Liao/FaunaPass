server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

spring:
  application:
    name: campus-stray-animal
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  web:
    resources:
      static-locations: classpath:/static/,file:${app.upload-dir}/
  profiles:
    active: pgsql   # 课设环境默认走 pgsql profile(无参数启动)

app:
  upload-dir: ${app.upload.dir:${user.dir}/uploads}
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-please-replace-32bytes-min!!}
    expire-hours: 24
    header: Authorization
    prefix: "Bearer "

# MyBatis-Plus 全局配置:基础项放主 yml,具体方言(db-type)由各 profile 覆盖
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.cazoo.animal: INFO
    org.springframework.security: INFO

# 显式告诉 Spring 用 UTF-8 处理所有 HTTP 消息(包含 JSON)
spring.mvc.servlet:
  load-on-startup: 1

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:test;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:db/init-test.sql
